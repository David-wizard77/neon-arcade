<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Neon Arcade</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-text">Neon Arcade</div>
            <div class="auth-logo-sub">Acesse sua conta</div>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input class="form-input" type="email" id="email" name="email"
                    required autocomplete="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="senha">Senha</label>
                <input class="form-input" type="password" id="senha" name="senha"
                    required autocomplete="current-password" placeholder="••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnSubmit">Entrar</button>
        </form>

        <p class="form-msg" id="msgFeedback" role="alert" aria-live="polite"></p>

        <div class="auth-link">Não tem conta? <a href="cadastro.html">Cadastre-se</a></div>
        <div class="auth-link" style="margin-top:8px"><a href="index.html">← Voltar para a loja</a></div>
    </div>

    <script src="assets/js/app/auth.js"></script>
    <script src="assets/js/app/ui.js"></script>
    <script>
        Auth.redirectIfLoggedIn();

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const btn   = document.getElementById('btnSubmit');

            if (!email || !senha) { UI.setMsg('msgFeedback', 'Preencha todos os campos.', 'erro'); return; }

            UI.setLoading(btn, true, 'Entrar');
            const res = await Auth.login(email, senha);
            if (res.ok) {
                location.replace('index.html');
            } else {
                UI.setMsg('msgFeedback', res.msg, 'erro');
                UI.setLoading(btn, false, 'Entrar');
            }
        });
    </script>
</body>
</html>
